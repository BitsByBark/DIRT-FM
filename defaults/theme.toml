[vars]
primary_bg = "#0D0D0D"
secondary_bg = "#1A1A1A"
accent = "#E63636"
accent_bg = "#7A1F1F"
active = "#00BBBB"
active_bg = "#0E5F66"
primary_fg = "#E0E0E0"
secondary_fg = "#888888"
focused_dir_text = "$primary_bg"
focused_dir_bg = "$accent"
active_dir_text = "$primary_bg"
active_dir_bg = "$active"
defult_panel_label = "#555555"
defult_panel_border = "#555555"
defult_text = "$primary_fg"
bool_yes = "#84E052"
bool_no = "#F64646"
mascot_empty_body = "#F64646"
error_color = "#f64646"
selection_mode = "#EB8D47"
search_mode = "#4CB2F6"
bookmark_mode = "#EE9C9C"
sudo_mode = "#A8F227"

[mascot]
empty_dir_body = "$mascot_empty_body"
incompatible_body = "$mascot_empty_body"
no_perms_body = "$sudo_mode"
text = "#FFFFFF"
shadow = "#FFFFFF"

[top_bar]
border = "$defult_text"
dirt_label = "$defult_text"
separator = "$defult_text"
profile_name = "$defult_text"
selection_mode_label = "$defult_text"

[search_bar]
border = "$accent"
placeholder = "$secondary_fg"
text = "$primary_fg"
cursor = "$active"
match = "$accent"
no_match = "#F64646"

[sidebar]
border = "#2A2A2A"
section_header = "$accent"
bookmark_name = "$primary_fg"
bookmark_path = "$secondary_fg"
drive_name = "$primary_fg"
drive_path = "$secondary_fg"
recent_name = "$secondary_fg"
selected_bg = "#1F1F1F"
selected_fg = "$active"
scrollbar = "$secondary_fg"

[col_1]
border = "$primary_bg"
header = "$primary_fg"
dir = "$defult_text"
file = "$defult_text"
symlink = "$defult_text"
executable = "$defult_text"
hidden = "$secondary_fg"
focused_bg = "$focused_dir_bg"
focused_fg = "$primary_bg"
selected_bg = "$accent_bg"
selected_fg = "$primary_fg"
scrollbar = "$primary_fg"

[col_2]
border = "$primary_bg"
header = "$primary_fg"
dir = "$defult_text"
file = "$defult_text"
symlink = "$defult_text"
executable = "$defult_text"
hidden = "$secondary_fg"
focused_bg = "$focused_dir_bg"
focused_fg = "$primary_bg"
selected_bg = "$accent_bg"
selected_fg = "$primary_fg"
scrollbar = "$primary_fg"

[col_3]
border = "$active_bg"
header = "$active"
dir = "$active"
file = "$active"
symlink = "$active"
executable = "$active"
hidden = "$secondary_fg"
focused_bg = "$focused_dir_bg"
focused_fg = "$primary_bg"
selected_bg = "$accent_bg"
selected_fg = "$primary_fg"
scrollbar = "$active"

[col_4]
border = "$primary_bg"
header = "$primary_fg"
dir = "$defult_text"
file = "$defult_text"
symlink = "$defult_text"
executable = "$defult_text"
hidden = "$secondary_fg"
focused_bg = "$focused_dir_bg"
focused_fg = "$primary_bg"
selected_bg = "$accent_bg"
selected_fg = "$primary_fg"
scrollbar = "$primary_fg"

[preview]
border = "#2A2A2A"
label = "$secondary_fg"
value = "$primary_fg"
bool_true = "#84E052"
bool_false = "$secondary_fg"
size = "$primary_fg"
date = "$secondary_fg"
path = "$primary_fg"
match = "$accent"
line_number = "$secondary_fg"
scrollbar = "$secondary_fg"

[status_bar]
border = "#2A2A2A"
path = "$active"
separator = "$secondary_fg"
file_count = "$secondary_fg"
selected_name = "$secondary_fg"
git = "$accent"
git_none = "$secondary_fg"
profile = "$secondary_fg"
selection_mode = "#EB8D47"
message = "$secondary_fg"

[keymap_bar]
border = "#2A2A2A"
key = "$accent"
label = "$secondary_fg"
separator = "$secondary_fg"

[overlay]
dim_bg       = "$secondary_bg"
border       = "$accent"
background   = "$primary_bg"
title_fg     = "$accent"
text_fg      = "$primary_fg"
secondary_fg = "$secondary_fg"
input_bg     = "$secondary_bg"
input_fg     = "$primary_fg"
input_cursor = "$active"
bool_yes     = "#84E052"
bool_no      = "#F64646"
bool_yes_bg  = "$primary_bg"
bool_no_bg   = "$primary_bg"

[git]
modified = "#EBC547"
untracked = "$secondary_fg"
staged = "#84E052"
ignored = "#444444"
conflicted = "#F64646"

[selection]
bg = "#1F1F1F"
fg = "$active"
range_bg = "#162828"
dim_fg = "#000000"
